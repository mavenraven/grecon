name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/recon \
            target/x86_64-apple-darwin/release/recon \
            -output recon-macos
          chmod +x recon-macos

      - name: Publish release
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          gh release create "${SHORT_SHA}" recon-macos \
            --title "recon ${SHORT_SHA}" \
            --notes "Built from \`${GITHUB_SHA}\` on $(date -u +%Y-%m-%d)" \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
