name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build (arm64)
        run: GOARCH=arm64 GOOS=darwin go build -o grecon-darwin-arm64 .

      - name: Build (x86_64)
        run: GOARCH=amd64 GOOS=darwin go build -o grecon-darwin-amd64 .

      - name: Publish release
        run: |
          chmod +x grecon-darwin-arm64 grecon-darwin-amd64
          SHORT_SHA="${GITHUB_SHA::7}"
          gh release create "${SHORT_SHA}" grecon-darwin-arm64 grecon-darwin-amd64 \
            --title "grecon ${SHORT_SHA}" \
            --notes "Built from \`${GITHUB_SHA}\` on $(date -u +%Y-%m-%d)" \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
